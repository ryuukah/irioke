<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Popup</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="window">
  <div class="title-bar">
    <span class="title">♡</span>

    <div class="window-controls">
      <div class="control min"></div>
      <div class="control max"></div>
      <div class="control close"></div>
    </div>
  </div>

  <div class="content">
    <div class="icon">⚠️</div>

    <div class="text">
      <p id="message">Ning Yizhuo.</p>
      <p class="face">ヽ(♡‿♡)ノ</p>
      <button id="okBtn">OK</button>
    </div>
  </div>
</div>

<audio id="sound" src="sound.mp3"></audio>
<script src="script.js"></script>

</body>
</html>
